apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqora-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqora-app
  template:
    metadata:
      labels:
        app: sqora-app
    spec:
      containers:
        - name: sqora-backend
          image: teaching-sqora-backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: teaching-app-config
          ports:
            - name: backend
              containerPort: 8000
            - name: rag
              containerPort: 5001
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: shared-media
              mountPath: /app/user_data
            - name: shared-media
              mountPath: /app/manim/media
            - name: dotenv
              mountPath: /app/.env
              subPath: .env
            - name: unmute-config
              mountPath: /app/Unmute/config.json
              subPath: config.json
          readinessProbe:
            httpGet:
              path: /
              port: backend
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: backend
            initialDelaySeconds: 40
            periodSeconds: 20
        - name: manim-runner
          image: teaching-manim-runner:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: teaching-app-config
          ports:
            - name: runner
              containerPort: 8080
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /health
              port: runner
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: runner
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: shared-media
          persistentVolumeClaim:
            claimName: shared-media
        - name: dotenv
          secret:
            secretName: sqora-dotenv
        - name: unmute-config
          configMap:
            name: unmute-runtime-config
---
apiVersion: v1
kind: Service
metadata:
  name: sqora-app
spec:
  selector:
    app: sqora-app
  ports:
    - name: backend
      port: 8000
      targetPort: backend
    - name: rag
      port: 5001
      targetPort: rag
    - name: runner
      port: 8080
      targetPort: runner
